[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "devotional-engine"
version = "6.3.0"
description = "Deterministic Truth-Beauty devotional ghostwriting engine skeleton"
requires-python = ">=3.11"

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
