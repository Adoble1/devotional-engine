name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e '.[test]'
      - name: Run tests with concise failure output
        shell: bash
        run: |
          set +e
          python -m pytest > pytest.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            tail -n 160 pytest.log
            exit $status
          fi
          tail -n 40 pytest.log
      - run: python -m compileall -q devotional_engine examples
