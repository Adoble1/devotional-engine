name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e '.[test]'
      - name: Run tests
        id: tests
        shell: bash
        run: |
          set +e
          python -m pytest > pytest-${{ matrix.python-version }}.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.log
      - name: Enforce test result
        shell: bash
        run: |
          cat pytest-${{ matrix.python-version }}.log
          test "${{ steps.tests.outputs.status }}" = "0"
      - run: python -m compileall -q devotional_engine examples
